<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowQuest Planner</title>

    <link rel="stylesheet" href="style.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="theme-toggle">
        <button id="themeBtn">☾</button>
    </div>

    <div class="container">

        <h1>GrowQuest Planner</h1>

        <div class="watering-reminder">
            Daily Reminder: Stay hydrated and take a short break today.
        </div>

        <div class="plant-section">

            <div class="plant-pot" id="plantIcon">
                🌱
            </div>

            <div id="plantStage">
                Seed
            </div>

            <div id="progressPercent">
                0%
            </div>

        </div>

        <div class="progress-container">
            <div id="progressBar"></div>
        </div>

        <div class="input-section">

            <input
                type="text"
                id="taskInput"
                placeholder="Plant a new task...">

            <input
                type="date"
                id="dueDate">

            <button id="addBtn">
                Add
            </button>

        </div>

        <ul id="taskList"></ul>

    </div>

    <script src="script.js"></script>

</body>

</html>
